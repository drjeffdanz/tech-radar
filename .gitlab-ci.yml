image: node:20-alpine

stages:
  - build
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main

pages:
  stage: deploy
  script:
    # GitLab Pages requires the artifact folder to be named "public"
    - mv dist public
  artifacts:
    paths:
      - public
  only:
    - main
  dependencies:
    - build
